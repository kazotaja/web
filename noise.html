<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Gradient with Noise</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff200, #ffcc00, #ff9900);
            background-size: 200% 200%;
            animation: gradientAnimation 15s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .noise {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/noise.png'); /* Replace with your noise texture URL */
            opacity: 0.15; /* Adjust the opacity to control the visibility of the noise */
        }

        .content {
            position: relative;
            color: #333; /* Text color */
            z-index: 1; /* Ensure content is above the noise layer */
        }
    </style>
</head>

<body>
    <div class="content">
        <h1>Smooth Noisy Yellow Gradients</h1>
        <p>This is an example of a smooth yellow gradient with a noise overlay.</p>
    </div>
    <div class="noise"></div>
</body>

</html>
